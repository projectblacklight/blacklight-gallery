name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    name: test (ruby ${{ matrix.ruby }} / rails ${{ matrix.rails_version }} / blacklight ${{ matrix.blacklight_version }} ${{ matrix.additional_name }})
    strategy:
      matrix:
        ruby: ["3.3", "3.4", "4.0"]
        rails_version: ["8.1.3"]
        blacklight_version: ["~> 9.0"]
        experimental: [false]
        additional_engine_cart_rails_options: [""] # default: propshaft, bootstrap, importmaps
        additional_name: [""]
        include:
          - ruby: "3.4"
            rails_version: "7.2.3.1"
            experimental: false
          - ruby: "3.4"
            blacklight_version: "~> 8.12"
            rails_version: "8.0.5"
            experimental: false
            additional_name: "Rails 8.0 / Blacklight 8.12"
    env:
      RAILS_VERSION: ${{ matrix.rails_version }}
      BLACKLIGHT_VERSION: ${{ matrix.blacklight_version }}
      ENGINE_CART_RAILS_OPTIONS: "--skip-git --skip-listen --skip-spring --skip-keeps --skip-action-cable --skip-coffee --skip-test ${{ matrix.additional_engine_cart_rails_options }}"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
      - name: Install dependencies with Rails ${{ matrix.rails_version }}
        run: bundle install
      - name: Run tests
        run: bundle exec rake
